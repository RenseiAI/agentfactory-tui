name: Debug Apple Secrets (REN-1412)

# Diagnostic-only workflow: prints whether each APPLE_* secret arrives at
# the runner as a non-empty env var, without revealing any values.
# Manually triggered only. Remove after REN-1412 root-cause is identified.

on:
  workflow_dispatch:

jobs:
  debug:
    strategy:
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Inspect APPLE_* env presence
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set +x
          for var in APPLE_DEVELOPER_ID APPLE_DEVELOPER_ID_CERT_BASE64 APPLE_DEVELOPER_ID_CERT_PASSWORD APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var+x}" ]; then
              echo "$var: UNSET (env var not set at all)"
            else
              val="${!var}"
              len="${#val}"
              if [ "$len" -eq 0 ]; then
                echo "$var: EMPTY (env var set, zero length)"
              else
                echo "$var: SET (length=$len)"
              fi
            fi
          done

          echo ""
          echo "=== printenv APPLE_* (names only, values masked by GitHub) ==="
          printenv | grep '^APPLE_' | awk -F= '{print $1}' | sort
