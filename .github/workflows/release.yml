name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.4)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # macOS runner is required for codesign + xcrun notarytool (REN-1412).
    # Cross-compile to linux/amd64 + linux/arm64 still works from darwin via
    # CGO_ENABLED=0 (set in .goreleaser.yaml).
    runs-on: macos-latest
    # Job-level env block: REN-1412. Step-level env: blocks on
    # goreleaser/goreleaser-action@v6 (node24 action) did not propagate
    # APPLE_DEVELOPER_ID/APPLE_PASSWORD/APPLE_TEAM_ID to the goreleaser
    # subprocess, causing `signs[].env: APPLE_DEVELOPER_ID={{ .Env.APPLE_DEVELOPER_ID }}`
    # template eval to fail with `map has no entry for key
    # "APPLE_DEVELOPER_ID"`. Job-level env is always merged into the env
    # of every step subprocess, regardless of action runtime quirks.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Import the Apple Developer ID Application certificate into an
      # ephemeral RUNNER_TEMP keychain so `codesign` (invoked by
      # scripts/sign-and-notarize.sh via GoReleaser's signs: block) can find
      # the signing identity. RUNNER_TEMP is auto-cleaned up after the job,
      # so this never pollutes the runner's default keychain.
      #
      # Replaces GoReleaser's built-in `notarize:` block which fails with
      # `failed to verify certificate chain: x509: unhandled critical
      # extension` (Go's x509 strict mode rejects Apple's critical extension
      # 1.2.840.113635.100.6.1.13). See REN-1412 for the v0.3.1 failure.
      - name: Import Apple Developer ID cert to keychain
        if: env.APPLE_DEVELOPER_ID_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_DEVELOPER_ID_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          # shellcheck disable=SC2046 # intentional word-split: keychain list is a space-separated argv
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          # Verify the identity is now available before handing off to GoReleaser.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
