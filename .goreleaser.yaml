version: 2

project_name: agentfactory-tui

builds:
  - id: af
    main: ./cmd/af
    binary: af
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "af_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: af
    repository:
      owner: RenseiAI
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/RenseiAI/agentfactory-tui"
    description: "AgentFactory CLI — terminal dashboard and CLI for AI agent fleets"
    binaries:
      - af

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
