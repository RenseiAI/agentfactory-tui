version: "2"

# Baseline linter set — catches real bugs without blocking on style or
# legacy patterns. Additional linters (gocritic, gosec, revive)
# will be enabled incrementally via dedicated cleanup tickets.

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - gocritic
  exclusions:
    rules:
      # Quickfix suggestions (QF*) are style hints, not bug indicators.
      - linters:
          - staticcheck
        text: "^QF[0-9]+"

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
