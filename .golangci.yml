version: "2"

# Baseline linter set — catches real bugs without blocking on style or
# legacy patterns. Additional linters (errcheck, gocritic, gosec, revive)
# will be enabled incrementally via dedicated cleanup tickets.

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
  exclusions:
    rules:
      # Quickfix suggestions (QF*) are style hints, not bug indicators.
      - linters:
          - staticcheck
        text: "^QF[0-9]+"
      # internal/views/detail/ contains scaffolded timeline code pending
      # wire-up. Tracked for cleanup in a dedicated ticket.
      - path: internal/views/detail/
        linters:
          - unused
      # Dashboard columnLayout.total() reserved for future width calc.
      - path: internal/views/dashboard/table.go
        linters:
          - unused

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
