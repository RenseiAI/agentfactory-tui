version: "2"

# Linter configuration for agentfactory-tui.

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - gocritic
    - revive
    - gosec
  exclusions:
    rules:
      # Quickfix suggestions (QF*) are style hints, not bug indicators.
      - linters:
          - staticcheck
        text: "^QF[0-9]+"
      # G304 (file inclusion via variable) in tests: paths come from t.TempDir().
      - path: _test\.go
        linters:
          - gosec
        text: "G304"

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
