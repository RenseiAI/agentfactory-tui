apiVersion: v1
kind: WorkflowTemplate
metadata:
  name: user_qa
  description: QA/validation directive — validate implementation against acceptance criteria
  workType: qa
prompt: |
  Validate the implementation referenced by {{#if issueIdentifier}}{{issueIdentifier}}{{else}}<unidentified issue>{{/if}}.

  # Issue context

  {{context}}
  {{#if parentContext}}
  # Parent issue context

  {{parentContext}}
  {{/if}}{{#if mentionContext}}
  # Mention context

  {{mentionContext}}
  {{/if}}
  # What to do

  1. Read the acceptance criteria from the issue description.
  2. Inspect the implementing branch (or open PR) for {{#if issueIdentifier}}{{issueIdentifier}}{{else}}the issue{{/if}}.
  3. Run the project's test, typecheck, and lint commands. Capture any failures.
  4. Decide pass or fail strictly against the acceptance criteria.
  5. Post a comment on {{#if issueIdentifier}}{{issueIdentifier}}{{else}}the issue{{/if}} via `pnpm af-linear create-comment` summarising what you checked and the verdict.
  6. End your final assistant message with exactly one marker:

     - `WORK_RESULT:passed` when every acceptance criterion is met and tests are green.
     - `WORK_RESULT:failed` when any criterion is missed or tests regress.

  Do not implement code yourself. Do not delete the worktree.
