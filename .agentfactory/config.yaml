apiVersion: v1
kind: RepositoryConfig
repository: github.com/RenseiAI/agentfactory-tui
profiles:
  codex-dev:
    provider: codex
    model: gpt-5.4
    effort: high
    openai:
      serviceTier: fast
      reasoningSummary: concise
    subAgent:
      model: gpt-5.4-mini
      effort: low

  claude-coord:
    provider: claude
    model: claude-opus-4-7
    effort: xhigh
    anthropic:
      contextWindow: 1000000
    subAgent:
      provider: claude
      model: claude-sonnet-4-6
      effort: medium

  claude-qa:
    provider: claude
    model: claude-sonnet-4-6
    effort: medium

dispatch:
  default: codex-dev
  byWorkType:
    # Single-issue dev work (code edits, PR creation)
    development: codex-dev
    inflight: codex-dev

    # Coordination (parent issues that fan out to sub-agents — need big context)
    coordination: claude-coord
    inflight-coordination: claude-coord
    qa-coordination: claude-coord
    acceptance-coordination: claude-coord
    refinement-coordination: claude-coord

    # Review / verdict work (read code + render judgment)
    qa: claude-qa
    acceptance: claude-qa
    refinement: claude-qa

    # Authoring / planning (Linear issue editing, no code edits)
    research: claude-coord
    backlog-creation: claude-coord

    # Specialized
    merge: codex-dev          # mechanical: rebase, run tests, push
    security: claude-coord    # SAST/audit; favor careful reasoning over speed
packageManager: none
buildCommand: "make build"
testCommand: "go test ./..."
validateCommand: "go vet ./..."
allowedProjects:
  - agentfactory-tui
codeIntelligence:
  enforceUsage: true
mergeDriver: mergiraf
mergeQueue:
  enabled: true
  provider: local
  strategy: rebase
  mergiraf: true
  lockFileRegenerate: false
  autoEnqueue: true
  testCommand: "go test ./..."
  testTimeout: 300000
  pollInterval: 10000
  maxRetries: 2
  escalation:
    onConflict: reassign
    onTestFailure: notify
quality:
  baselineEnabled: true
  ratchetEnabled: true
  boyscoutRule: true
  tddWorkflow: true
