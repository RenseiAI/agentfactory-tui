apiVersion: v1
kind: RepositoryConfig
repository: github.com/RenseiAI/agentfactory-tui
providers:
  default: claude
  byWorkType:
    research: claude
    qa: claude
    acceptance: claude
packageManager: none
buildCommand: "make build"
testCommand: "go test ./..."
validateCommand: "go vet ./..."
allowedProjects:
  - agentfactory-tui
quality:
  baselineEnabled: true
  ratchetEnabled: true
  boyscoutRule: true
  tddWorkflow: true
